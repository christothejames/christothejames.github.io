<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dancing Cat</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #ff6b35 0%, #f7931e 40%, #2b1055 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  .stage {
    text-align: center;
  }

  .cat {
    width: 260px;
    animation: dance 0.6s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
  }

  @keyframes dance {
    0%   { transform: rotate(-8deg) translateY(0); }
    25%  { transform: rotate(0deg) translateY(-18px); }
    50%  { transform: rotate(8deg) translateY(0); }
    75%  { transform: rotate(0deg) translateY(-18px); }
    100% { transform: rotate(-8deg) translateY(0); }
  }

  .gun {
    animation: shoot 0.3s steps(1) infinite;
  }

  @keyframes shoot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .muzzle-flash {
    animation: flash 0.15s steps(1) infinite;
  }

  @keyframes flash {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  h1 {
    color: white;
    font-size: 2rem;
    margin-top: 20px;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    letter-spacing: 2px;
    animation: wiggle 0.6s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .confetti {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="stage">
  <svg class="cat" viewBox="0 0 260 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Sombrero -->
    <ellipse cx="130" cy="55" rx="95" ry="18" fill="#d99a37" stroke="#7a5218" stroke-width="3"/>
    <ellipse cx="130" cy="48" rx="50" ry="14" fill="#e6ac4a" stroke="#7a5218" stroke-width="3"/>
    <path d="M 100 40 Q 130 20 160 40" fill="none" stroke="#7a5218" stroke-width="3"/>
    <circle cx="130" cy="35" r="4" fill="#c0392b"/>

    <!-- Cat body -->
    <ellipse cx="130" cy="180" rx="55" ry="65" fill="#4a4a4a"/>
    <!-- Cat head -->
    <circle cx="130" cy="110" r="48" fill="#4a4a4a"/>
    <!-- Ears -->
    <polygon points="95,80 85,45 115,70" fill="#4a4a4a"/>
    <polygon points="165,80 175,45 145,70" fill="#4a4a4a"/>
    <polygon points="98,75 92,55 108,68" fill="#c47a7a"/>
    <polygon points="162,75 168,55 152,68" fill="#c47a7a"/>

    <!-- Face -->
    <ellipse cx="113" cy="112" rx="7" ry="9" fill="#fff"/>
    <ellipse cx="147" cy="112" rx="7" ry="9" fill="#fff"/>
    <circle cx="113" cy="113" r="3.5" fill="#111"/>
    <circle cx="147" cy="113" r="3.5" fill="#111"/>
    <polygon points="130,122 125,130 135,130" fill="#c47a7a"/>
    <path d="M 130 130 Q 130 138 122 140" stroke="#222" stroke-width="2" fill="none"/>
    <path d="M 130 130 Q 130 138 138 140" stroke="#222" stroke-width="2" fill="none"/>
    <!-- Whiskers -->
    <line x1="70" y1="110" x2="100" y2="112" stroke="#eee" stroke-width="2"/>
    <line x1="70" y1="122" x2="100" y2="120" stroke="#eee" stroke-width="2"/>
    <line x1="190" y1="110" x2="160" y2="112" stroke="#eee" stroke-width="2"/>
    <line x1="190" y1="122" x2="160" y2="120" stroke="#eee" stroke-width="2"/>

    <!-- Bandana -->
    <path d="M 90 150 Q 130 165 170 150 L 165 165 Q 130 178 95 165 Z" fill="#c0392b"/>

    <!-- Arms holding gun -->
    <rect x="150" y="165" width="70" height="14" rx="5" fill="#333" class="gun" transform="rotate(-10 150 172)"/>
    <rect x="205" y="150" width="10" height="20" fill="#222" transform="rotate(-10 150 172)"/>
    <ellipse cx="185" cy="175" rx="16" ry="10" fill="#4a4a4a"/>

    <!-- Muzzle flash -->
    <g class="muzzle-flash">
      <polygon points="222,160 240,155 232,168 248,168 228,178 232,190 214,178" fill="#ffd23f"/>
    </g>

    <!-- Legs -->
    <ellipse cx="105" cy="245" rx="14" ry="20" fill="#4a4a4a"/>
    <ellipse cx="155" cy="245" rx="14" ry="20" fill="#4a4a4a"/>
    <ellipse cx="105" cy="262" rx="16" ry="8" fill="#2f2f2f"/>
    <ellipse cx="155" cy="262" rx="16" ry="8" fill="#2f2f2f"/>

    <!-- Tail -->
    <path d="M 180 200 Q 230 210 220 160 Q 215 190 185 195" fill="#4a4a4a"/>
  </svg>

  <h1>🎉 FIESTA MODE 🎉</h1>
</div>

<script>
  const emojis = ["🎉", "🌵", "🔥", "🎶", "🌶️", "⭐"];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = 3 + Math.random() * 4 + "s";
    c.style.animationDelay = Math.random() * 5 + "s";
    c.style.fontSize = 14 + Math.random() * 16 + "px";
    document.body.appendChild(c);
  }
</script>

</body>
</html>
