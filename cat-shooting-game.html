<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisker Watch — a cat shooting game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #1B1030;
    --night-deep: #120A22;
    --lamp: #FFD27A;
    --lamp-soft: #F4A340;
    --cat: #E8792A;
    --cat-dark: #B85A1A;
    --mouse: #C7BEDD;
    --mouse-dark: #8F84AC;
    --pink: #FF6B9D;
    --cream: #FDF6E3;
    --cream-dim: #C9C0DE;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% 0%, #2A1C48 0%, var(--night) 55%, var(--night-deep) 100%);
    font-family:'Quicksand', sans-serif;
    color: var(--cream);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  #stage{
    position:relative;
    width:100%;
    max-width:520px;
    aspect-ratio: 9/16;
    max-height:100vh;
    background: linear-gradient(180deg, #241A3E 0%, #1B1030 60%, #150C28 100%);
    border-radius: 18px;
    overflow:hidden;
    box-shadow: 0 0 0 2px rgba(255,210,122,0.12), 0 30px 80px rgba(0,0,0,0.6);
    cursor:none;
  }
  canvas{ display:block; width:100%; height:100%; }

  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px;
    font-family:'Fredoka', sans-serif;
    pointer-events:none;
    z-index:5;
  }
  .hud .score{
    font-size:22px; font-weight:600; color: var(--lamp);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    letter-spacing:0.5px;
  }
  .hud .lives{ display:flex; gap:6px; font-size:20px; }
  .hud .lives span.lost{ opacity:0.25; filter:grayscale(1); }

  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    background: radial-gradient(ellipse at 50% 30%, rgba(42,28,72,0.92) 0%, rgba(18,10,34,0.97) 70%);
    padding: 30px;
    z-index:10;
  }
  .overlay h1{
    font-family:'Fredoka', sans-serif;
    font-size: 34px;
    margin: 0 0 6px 0;
    color: var(--lamp);
    text-shadow: 0 0 24px rgba(244,163,64,0.5);
  }
  .overlay .eyebrow{
    font-family:'Fredoka', sans-serif;
    font-size:13px;
    letter-spacing: 3px;
    text-transform:uppercase;
    color: var(--pink);
    margin-bottom: 10px;
  }
  .overlay p{
    max-width: 320px;
    line-height:1.5;
    color: var(--cream-dim);
    font-size:15px;
    margin: 6px 0 22px 0;
  }
  .overlay .stat{
    font-family:'Fredoka', sans-serif;
    font-size:16px;
    color:var(--cream);
    margin-bottom: 4px;
  }
  .overlay .stat b{ color: var(--lamp); font-size:20px; }
  button{
    font-family:'Fredoka', sans-serif;
    font-size:17px;
    font-weight:600;
    color: var(--night-deep);
    background: linear-gradient(180deg, var(--lamp) 0%, var(--lamp-soft) 100%);
    border:none;
    padding: 13px 34px;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: 0 8px 20px rgba(244,163,64,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    pointer-events:auto;
  }
  button:hover{ transform: translateY(-2px); box-shadow: 0 12px 26px rgba(244,163,64,0.45); }
  button:active{ transform: translateY(0px) scale(0.97); }

  .hint{
    margin-top:16px;
    font-size:12px;
    color: var(--cream-dim);
    letter-spacing:0.5px;
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score" id="scoreLabel">0 <span style="font-size:14px;font-weight:500;color:var(--cream-dim);">fish</span></div>
    <div class="lives" id="livesLabel"></div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="eyebrow">Whisker Watch</div>
    <h1>Guard the fish bowl</h1>
    <p>Mice are sneaking down from the shelf to steal your fish. Aim with your mouse (or finger) and tap to fling yarn balls. Don't let them reach the bottom.</p>
    <button id="startBtn">Start watch</button>
    <div class="hint">move to aim · click / tap to shoot</div>
  </div>

  <div class="overlay" id="endOverlay" style="display:none;">
    <div class="eyebrow">Watch over</div>
    <h1 id="endTitle">The mice got in</h1>
    <div class="stat">Fish saved this round <b id="finalScore">0</b></div>
    <div class="stat" style="margin-bottom:18px;">Best so far <b id="bestScore">0</b></div>
    <button id="retryBtn">Watch again</button>
  </div>
</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W, H, DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const rect = stage.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- state ----------
  const state = {
    running:false,
    score:0,
    lives:3,
    best: parseInt(localStorage.getItem('whiskerwatch_best')||'0', 10) || 0,
    time:0,
    spawnTimer:0,
    spawnInterval:1400,
    difficulty:1,
  };

  const pointer = { x: 0, y: 0, active:false };

  const catState = { x: 0, y:0, tilt:0 };

  let mice = [];
  let yarnBalls = [];
  let particles = [];

  function resetGame(){
    state.score = 0;
    state.lives = 3;
    state.time = 0;
    state.spawnTimer = 0;
    state.spawnInterval = 1400;
    state.difficulty = 1;
    mice = [];
    yarnBalls = [];
    particles = [];
    renderHUD();
  }

  // ---------- helpers ----------
  function rand(min,max){ return Math.random()*(max-min)+min; }

  function spawnMouse(){
    const size = rand(30,42);
    mice.push({
      x: rand(size, W-size),
      y: -size,
      size,
      speed: rand(28,42) * state.difficulty,
      wobble: rand(0, Math.PI*2),
      wobbleSpeed: rand(1.2,2.4),
      hp: 1,
      golden: Math.random() < 0.12,
      caught:false,
    });
  }

  function shoot(targetX, targetY){
    const originX = catState.x;
    const originY = H - 78;
    const dx = targetX - originX;
    const dy = targetY - originY;
    const dist = Math.hypot(dx,dy) || 1;
    const speed = 620;
    yarnBalls.push({
      x: originX, y: originY,
      vx: dx/dist*speed, vy: dy/dist*speed,
      r: 9,
      spin: 0,
    });
  }

  function burst(x,y,color,count){
    for(let i=0;i<count;i++){
      particles.push({
        x,y,
        vx: rand(-140,140),
        vy: rand(-180,-20),
        life: rand(0.4,0.8),
        age:0,
        color,
        size: rand(2,5),
      });
    }
  }

  // ---------- input ----------
  function getPos(e){
    const rect = stage.getBoundingClientRect();
    if(e.touches && e.touches.length){
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  stage.addEventListener('mousemove', e=>{
    const p = getPos(e); pointer.x = p.x; pointer.y = p.y; pointer.active = true;
  });
  stage.addEventListener('touchmove', e=>{
    const p = getPos(e); pointer.x = p.x; pointer.y = p.y; pointer.active = true;
    e.preventDefault();
  }, {passive:false});

  stage.addEventListener('mousedown', e=>{
    if(!state.running) return;
    const p = getPos(e);
    shoot(p.x, p.y);
  });
  stage.addEventListener('touchstart', e=>{
    if(!state.running) return;
    const p = getPos(e);
    pointer.x = p.x; pointer.y = p.y; pointer.active = true;
    shoot(p.x, p.y);
    e.preventDefault();
  }, {passive:false});

  // ---------- drawing ----------
  function drawBackground(){
    ctx.clearRect(0,0,W,H);

    // window glow top
    const grd = ctx.createRadialGradient(W*0.5, -H*0.1, 20, W*0.5, H*0.15, H*0.75);
    grd.addColorStop(0, 'rgba(255,210,122,0.14)');
    grd.addColorStop(1, 'rgba(255,210,122,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,H);

    // floor line
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, H-46, W, 46);

    // fish bowl silhouette (the thing being protected), centered bottom
    const bowlY = H - 46;
    ctx.save();
    ctx.translate(W/2, bowlY);
    ctx.fillStyle = 'rgba(255,210,122,0.10)';
    ctx.beginPath();
    ctx.ellipse(0, 6, 46, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,122,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -10, 30, Math.PI*0.15, Math.PI*0.85, false);
    ctx.stroke();
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🐟', 0, -8);
    ctx.restore();
  }

  function drawCat(){
    const targetX = pointer.active ? pointer.x : W/2;
    catState.x += (Math.max(30, Math.min(W-30,targetX)) - catState.x) * 0.25;
    const x = catState.x;
    const y = H - 40;

    ctx.save();
    ctx.translate(x,y);
    ctx.font = '46px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(232,121,42,0.45)';
    ctx.shadowBlur = 18;
    ctx.fillText('🐱', 0, 0);
    ctx.restore();
  }

  function drawReticle(){
    if(!pointer.active) return;
    ctx.save();
    ctx.translate(pointer.x, pointer.y);
    ctx.strokeStyle = 'rgba(255,210,122,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0,0,10,14,0,0,Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,-14); ctx.lineTo(0,14);
    ctx.strokeStyle = 'rgba(255,210,122,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawMice(){
    for(const m of mice){
      ctx.save();
      const wobbleX = Math.sin(m.wobble) * 10;
      ctx.translate(m.x + wobbleX, m.y);
      ctx.font = m.size + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if(m.golden){
        ctx.shadowColor = 'rgba(255,210,122,0.9)';
        ctx.shadowBlur = 20;
      }
      ctx.fillText('🐭', 0, 0);
      ctx.restore();
    }
  }

  function drawYarn(){
    for(const b of yarnBalls){
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.rotate(b.spin);
      ctx.font = '20px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🧶', 0, 0);
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, 1 - p.age/p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // ---------- update ----------
  function update(dt){
    state.time += dt;
    state.difficulty = 1 + state.time/45;
    state.spawnTimer += dt*1000;
    const interval = Math.max(420, state.spawnInterval - state.time*10);
    if(state.spawnTimer > interval){
      state.spawnTimer = 0;
      spawnMouse();
    }

    for(const m of mice){
      m.wobble += dt * m.wobbleSpeed;
      m.y += m.speed * dt;
    }

    for(const b of yarnBalls){
      b.x += b.vx*dt; b.y += b.vy*dt;
      b.spin += dt*10;
    }
    yarnBalls = yarnBalls.filter(b => b.x>-20 && b.x<W+20 && b.y>-20 && b.y<H+20);

    // collisions
    for(const b of yarnBalls){
      for(const m of mice){
        if(m.caught) continue;
        const dist = Math.hypot(b.x-m.x, b.y-m.y);
        if(dist < m.size*0.45 + b.r){
          m.caught = true;
          b.hit = true;
          const pts = m.golden ? 5 : 1;
          state.score += pts;
          burst(m.x, m.y, m.golden ? '#FFD27A' : '#FF6B9D', m.golden ? 18 : 10);
          renderHUD();
        }
      }
    }
    yarnBalls = yarnBalls.filter(b => !b.hit);

    // mice reaching bottom
    for(const m of mice){
      if(!m.caught && m.y > H - 30){
        m.caught = true;
        m.escaped = true;
        state.lives -= 1;
        burst(m.x, H-30, '#C7BEDD', 8);
        renderHUD();
        if(state.lives <= 0){
          endGame();
        }
      }
    }

    mice = mice.filter(m => !m.caught);

    for(const p of particles){
      p.age += dt;
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += 260*dt;
    }
    particles = particles.filter(p => p.age < p.life);
  }

  function renderHUD(){
    document.getElementById('scoreLabel').innerHTML = state.score + ' <span style="font-size:14px;font-weight:500;color:var(--cream-dim);">fish</span>';
    const livesLabel = document.getElementById('livesLabel');
    let html = '';
    for(let i=0;i<3;i++){
      html += `<span class="${i < state.lives ? '' : 'lost'}">🐟</span>`;
    }
    livesLabel.innerHTML = html;
  }

  // ---------- loop ----------
  let lastT = null;
  function loop(t){
    if(lastT === null) lastT = t;
    let dt = (t - lastT)/1000;
    dt = Math.min(dt, 0.033);
    lastT = t;

    drawBackground();
    drawMice();
    drawYarn();
    drawCat();
    drawParticles();
    drawReticle();

    if(state.running){
      update(dt);
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- game flow ----------
  function startGame(){
    resetGame();
    state.running = true;
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('endOverlay').style.display = 'none';
  }

  function endGame(){
    state.running = false;
    if(state.score > state.best){
      state.best = state.score;
      localStorage.setItem('whiskerwatch_best', String(state.best));
    }
    document.getElementById('finalScore').textContent = state.score;
    document.getElementById('bestScore').textContent = state.best;
    const titles = ['The mice got in', 'Whiskers is outnumbered', 'The fish bowl is not safe', 'Reinforcements needed'];
    document.getElementById('endTitle').textContent = titles[Math.floor(Math.random()*titles.length)];
    document.getElementById('endOverlay').style.display = 'flex';
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

  catState.x = W/2;
  renderHUD();
})();
</script>

</body>
</html>
