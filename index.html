<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dancing Cat</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #ff6b35 0%, #f7931e 40%, #2b1055 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  .stage {
    text-align: center;
  }

  .cat {
    width: 260px;
    animation: dance 0.6s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
  }

  @keyframes dance {
    0%   { transform: rotate(-8deg) translateY(0); }
    25%  { transform: rotate(0deg) translateY(-18px); }
    50%  { transform: rotate(8deg) translateY(0); }
    75%  { transform: rotate(0deg) translateY(-18px); }
    100% { transform: rotate(-8deg) translateY(0); }
  }

  .gun {
    animation: shoot 0.3s steps(1) infinite;
  }

  @keyframes shoot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .muzzle-flash {
    animation: flash 0.15s steps(1) infinite;
  }

  @keyframes flash {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  h1 {
    color: white;
    font-size: 2rem;
    margin-top: 20px;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    letter-spacing: 2px;
    animation: wiggle 0.6s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .confetti {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="stage">
  <svg class="cat" viewBox="0 0 260 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Sombrero -->
    <ellipse cx="130" cy="55" rx="95" ry="18" fill="#d99a37" stroke="#7a5218" stroke-width="3"/>
    <ellipse cx="130" cy="48" rx="50"
