<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Cat</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at center, #ff8c42 0%, #d1495b 35%, #2b1055 75%, #0d0221 100%);
    position: relative;
  }

  .speedlines {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .line {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 2px;
    background: linear-gradient(to right, transparent, #ffe66d55, transparent);
    transform-origin: left center;
    animation: pulse 1s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    0% { opacity: 0.15; }
    100% { opacity: 0.6; }
  }

  .stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .card-wrap {
    position: relative;
    display: inline-block;
  }

  .aura {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 115%;
    height: 115%;
    transform: translate(-50%, -50%);
    border-radius: 30px;
    background: radial-gradient(circle, #ffe66daa 0%, #ff9f1c66 45%, transparent 75%);
    animation: auraPulse 0.6s ease-in-out infinite alternate;
    filter: blur(10px);
    z-index: -1;
  }

  @keyframes auraPulse {
    0% { transform: translate(-50%, -50%) scale(0.96); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  }

  .card {
    width: 100%;
    display: block;
    border-radius: 24px;
    border: 4px solid #ffe66d;
    box-shadow:
      0 0 30px 6px #ff9500cc,
      0 15px 40px rgba(0,0,0,0.6);
    animation: bounce 0.6s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50% { transform: translateY(-14px) rotate(1.5deg); }
  }

  .energy-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffe66d;
    border-radius: 50%;
    box-shadow: 0 0 8px 2px #ffcc00;
    animation: rise linear infinite;
    z-index: 4;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-260px) scale(0); opacity: 0; }
  }

  h1 {
    color: #fff;
    font-size: 2.2rem;
    margin: 24px 0 0;
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow:
      0 0 10px #ff6b00,
      0 0 20px #ff9500,
      3px 3px 0 #1a0a2e;
    animation: textPulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes textPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
  }

  .kanji-flash {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    color: #ffe66d;
    text-shadow: 0 0 15px #ff6b00, 0 0 30px #ff3300;
    opacity: 0;
    animation: kanjiFlash 2.2s ease-in-out infinite;
    z-index: 5;
    white-space: nowrap;
  }
  @keyframes kanjiFlash {
    0%, 80% { opacity: 0; transform: translateX(-50%) scale(0.5); }
    85% { opacity: 1; transform: translateX(-50%) scale(1.3); }
    95% { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
  }
</style>
</head>
<body>

<div class="speedlines" id="speedlines"></div>
<div class="kanji-flash">⚡ POWER LEVEL: OVER 9000 ⚡</div>

<div class="stage">
  <div class="card-wrap">
    <div class="aura"></div>
    <div id="particles"></div>
    <img class="card" src="cat.jpg" alt="Battle Cat">
  </div>
  <h1>🌮 FIESTA MODE 🌮</h1>
</div>

<script>
  const speedContainer = document.getElementById('speedlines');
  for (let i = 0; i < 36; i++) {
    const line = document.createElement('div');
    line.className = 'line';
    const angle = (360 / 36) * i;
    const length = 45 + Math.random() * 45;
    line.style.width = length + 'vw';
    line.style.transform = `rotate(${angle}deg)`;
    line.style.animationDelay = (Math.random() * 1) + 's';
    speedContainer.appendChild(line);
  }

  const particleContainer = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'energy-particle';
    p.style.left = (40 + Math.random() * 220) + 'px';
    p.style.bottom = (Math.random() * 60) + 'px';
    p.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    p.style.animationDelay = (Math.random() * 2) + 's';
    particleContainer.appendChild(p);
  }
</script>

</body>
</html>
